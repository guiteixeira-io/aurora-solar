
services:
  aurorasolar:
    image: wordpress:latest
    container_name: aurorasolar-wordpress
    restart: always
    ports:
      - "4480:80"
    env_file: .env
    volumes:
      - ./wp-content:/var/www/html/wp-content
    networks:
      - sigma-net
    depends_on:
      - aurorasolar-db

  aurorasolar-db:
    image: mariadb:10.6
    container_name: aurorasolar-db
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:4454:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sigma-net

volumes:
  db_data:

networks:
  sigma-net:
    external: true
